<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿布扎比定向租房搜索 — 44 片区精选</title>
  <link rel="stylesheet" href="css/targeted.css">
</head>
<body>
  <nav class="top-bar" role="navigation" aria-label="Main Navigation">
    <div class="brand">
      <h1 id="i18n-title">精选房源</h1>
    </div>

    <div class="stats-inline" aria-live="polite">
      <div class="stat-item">
        <span class="v" id="stat-total" aria-labelledby="i18n-stat-total">—</span><span class="l" id="i18n-stat-total">房源</span>
      </div>
      <div class="stat-item">
        <span class="v" id="stat-avg-score" aria-labelledby="i18n-stat-avg-score">—</span><span class="l" id="i18n-stat-avg-score">中位分</span>
      </div>
      <div class="stat-item">
        <span class="v" id="stat-avg-cost" aria-labelledby="i18n-stat-avg-cost">—</span><span class="l" id="i18n-stat-avg-cost">中位成本</span>
      </div>
      <div class="stat-item">
        <span class="v" id="stat-avg-ratio" aria-labelledby="i18n-stat-avg-ratio">—</span><span class="l" id="i18n-stat-avg-ratio">占比</span>
      </div>
    </div>

    <div class="top-meta-group">
      <div class="top-meta" id="i18n-top-meta">50k–80k · 开间/一居</div>
      <span class="rate-info" id="stat-updated"></span>
      <span class="rate-info" id="rate-info"></span>
      <div class="lang-switcher">
        <button type="button" class="lang-btn active" data-lang="zh" aria-label="切换到中文">CN</button>
        <button type="button" class="lang-btn" data-lang="en" aria-label="Switch to English">EN</button>
      </div>
    </div>
  </nav>

  <div class="mobile-filter-trigger">
    <button type="button" id="toggle-filters" aria-expanded="false" aria-controls="filters-section">
      <span id="i18n-filter-toggle">筛选条件</span>
    </button>
  </div>

  <!-- Filters -->
  <section class="filters" id="filters-section" aria-labelledby="i18n-filter-toggle">
    <form id="filter-form">
      <div class="filter-row main-filters">
        <div class="filter-group">
          <label for="neighborhood" id="i18n-label-neighborhood">片区</label>
          <select id="neighborhood">
            <option value="" id="i18n-opt-neighborhood-all">全部片区</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="interest" id="i18n-label-interest">筛选</label>
          <select id="interest">
            <option value="">全部房源</option>
            <option value="interested">感兴趣</option>
            <option value="ignored">不感兴趣</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="sort" id="i18n-label-sort">排序</label>
          <select id="sort">
            <option value="score">综合评分 ↓</option>
            <option value="cost">月均成本 ↑</option>
            <option value="commute">通勤 ↑</option>
            <option value="newest">最新发布 ↓</option>
            <option value="price">租金 ↑</option>
            <option value="price_desc">租金 ↓</option>
            <option value="size">面积 ↓</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="minScore" id="i18n-label-min-score">总分 ≥ <span id="minScore-display">0</span></label>
          <input type="range" id="minScore" min="0" max="100" value="0" step="5">
        </div>
        <div class="filter-group">
          <label for="maxCommute" id="i18n-label-commute">通勤 ≤ <span id="maxCommute-display">90</span> <span class="label-hint" id="i18n-hint-commute">分钟</span></label>
          <input type="range" id="maxCommute" min="0" max="90" value="90" step="5">
        </div>
      </div>

      <div class="filter-row score-filters">
        <div class="filter-group-toggle">
          <label id="i18n-label-park">停车位</label>
          <div class="toggle-pills" data-filter="minPark" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">有停车</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label id="i18n-label-util">水电费</label>
          <div class="toggle-pills" data-filter="minUtil" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">包水电</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label id="i18n-label-fee">中介费</label>
          <div class="toggle-pills" data-filter="minFee" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">免佣金</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label id="i18n-label-pay">付款方式</label>
          <div class="toggle-pills" data-filter="minPay" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">灵活付款</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label id="i18n-label-verified">认证</label>
          <div class="toggle-pills" data-filter="minVerified" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">已认证</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label id="i18n-label-oven">烤箱</label>
          <div class="toggle-pills" data-filter="minOven" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">有烤箱</button>
          </div>
        </div>
        <div class="filter-group-sm">
          <label id="i18n-label-val">综合成本 ≥ <span id="minVal-display">0</span> <span id="i18n-hint-val" class="label-hint">（满分 67）</span></label>
          <input type="range" id="minVal" min="0" max="67" value="0" step="5">
        </div>
        <div class="filter-group-sm">
          <label id="i18n-label-size">面积加分 ≥ <span id="minSize-display">0</span> <span id="i18n-hint-size" class="label-hint">（满分 10）</span></label>
          <input type="range" id="minSize" min="0" max="10" value="0" step="5">
        </div>
      </div>
    </form>
  </section>

  <!-- Results -->
  <main class="results">
    <div id="listings" class="listings-grid"></div>
    <div class="pagination-container">
      <div class="pagination" id="pagination"></div>
    </div>
    <div id="scroll-sentinel" class="scroll-sentinel">
      <span class="scroll-loading" id="scroll-loading"></span>
    </div>
  </main>

  <script src="https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.umd.min.js"></script>
  <script src="js/targeted.js"></script>
</body>
</html>
