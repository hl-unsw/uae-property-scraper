<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿布扎比定向租房搜索 — 44 片区精选</title>
  <link rel="stylesheet" href="css/targeted.css">
</head>
<body>
  <nav class="top-bar">
    <div class="brand">
      <a href="/" class="back-link">←</a>
      <h1 id="i18n-title">精选房源</h1>
    </div>

    <div class="stats-inline">
      <div class="stat-item">
        <span class="v" id="stat-total">—</span><span class="l" id="i18n-stat-total">房源</span>
      </div>
      <div class="stat-item">
        <span class="v" id="stat-avg-score">—</span><span class="l" id="i18n-stat-avg-score">均分</span>
      </div>
      <div class="stat-item">
        <span class="v" id="stat-avg-price">—</span><span class="l" id="i18n-stat-avg-price">中位价</span>
      </div>
      <div class="stat-item">
        <span class="v" id="stat-hoods">—</span><span class="l" id="i18n-stat-hoods">片区</span>
      </div>
    </div>

    <div class="top-meta-group">
      <div class="top-meta" id="i18n-top-meta">50k–80k · 开间/一居</div>
      <div class="lang-switcher">
        <button type="button" class="lang-btn active" data-lang="zh">CN</button>
        <button type="button" class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </nav>

  <!-- Filters -->
  <section class="filters">
    <form id="filter-form">
      <div class="filter-row main-filters">
        <div class="filter-group">
          <label for="neighborhood">片区</label>
          <select id="neighborhood">
            <option value="">全部片区</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="source">平台</label>
          <select id="source">
            <option value="">全部平台</option>
            <option value="pf">PropertyFinder</option>
            <option value="bayut">Bayut</option>
            <option value="dubizzle">Dubizzle</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="sort">排序</label>
          <select id="sort">
            <option value="score">综合评分 ↓</option>
            <option value="newest">最新发布 ↓</option>
            <option value="price">租金 ↑</option>
            <option value="price_desc">租金 ↓</option>
            <option value="size">面积 ↓</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="minScore">总分 ≥ <span id="minScore-display">0</span> 分</label>
          <input type="range" id="minScore" min="0" max="100" value="0" step="5">
        </div>
      </div>

      <div class="filter-row score-filters">
        <div class="filter-group-toggle">
          <label>停车位</label>
          <div class="toggle-pills" data-filter="minPark" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">有停车</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label>水电费</label>
          <div class="toggle-pills" data-filter="minUtil" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">包水电</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label>中介费</label>
          <div class="toggle-pills" data-filter="minFee" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">免佣金</button>
          </div>
        </div>
        <div class="filter-group-toggle">
          <label>付款方式</label>
          <div class="toggle-pills" data-filter="minPay" data-on="1">
            <button type="button" class="pill active" data-value="0">不限</button>
            <button type="button" class="pill" data-value="1">灵活付款</button>
          </div>
        </div>
        <div class="filter-group-sm">
          <label>性价比 ≥ <span id="minVal-display">0</span> 分<span class="label-hint">（满分 30）</span></label>
          <input type="range" id="minVal" min="0" max="30" value="0" step="5">
        </div>
        <div class="filter-group-sm">
          <label>面积加分 ≥ <span id="minSize-display">0</span> 分<span class="label-hint">（满分 15）</span></label>
          <input type="range" id="minSize" min="0" max="15" value="0" step="5">
        </div>
      </div>
    </form>
  </section>

  <!-- Results -->
  <section class="results">
    <div id="listings" class="listings-grid"></div>
    <div class="pagination-container">
      <div class="pagination" id="pagination"></div>
    </div>
    <div id="scroll-sentinel" class="scroll-sentinel">
      <span class="scroll-loading" id="scroll-loading"></span>
    </div>
  </section>

  <script src="js/targeted.js"></script>
</body>
</html>
