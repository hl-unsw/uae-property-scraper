services:
  mongo:
    image: mongo:8.0
    container_name: uae-spider-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?请在 .env 中设置 MONGO_PASSWORD}
    ports:
      - "0.0.0.0:${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
